<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConecta</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; }

    .phone-frame {
      width: 375px;
      height: 812px;
      max-height: 95%;
      border-radius: 48px;
      border: 6px solid #1a1a1a;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 2px #333, 0 40px 80px rgba(0,0,0,0.6), 0 0 120px rgba(255,255,255,0.03), inset 0 0 60px rgba(0,0,0,0.3);
    }

    .notch {
      width: 160px;
      height: 34px;
      background: #000;
      border-radius: 0 0 20px 20px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header-bar {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      height: 64px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 8px 30px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 10;
    }

    .tab-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      padding: 6px 12px;
      border-radius: 16px;
    }

    .tab-item:hover { background: rgba(255,255,255,0.05); }
    .tab-item.active .tab-icon-wrap { transform: translateY(-2px); }
    .tab-item.active .tab-dot { opacity: 1; transform: scale(1); }

    .tab-item .tab-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
      position: absolute;
      bottom: -2px;
    }

    .tab-icon-wrap { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    .tab-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: opacity 0.3s ease;
    }

    .tab-item:not(.active) .tab-label { opacity: 0.45; }
    .tab-item:not(.active) .tab-icon-wrap { opacity: 0.45; }

    .content-area {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 130px 20px 110px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .content-area::-webkit-scrollbar {
      width: 4px;
    }

    .content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }

    .opportunity-card {
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .opportunity-card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .category-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .home-indicator {
      width: 134px;
      height: 5px;
      border-radius: 100px;
      background: rgba(255,255,255,0.2);
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    .gradient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }

    .canvas-bg { background: radial-gradient(ellipse at center, #111 0%, #080808 100%); }

    .button-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .button-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(99,102,241,0.3);
    }

    .button-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .button-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full w-full canvas-bg overflow-auto">
  <main class="h-full w-full flex items-center justify-center p-4">
   <div class="phone-frame" style="background: #000;"><!-- Notch -->
    <div class="notch"></div><!-- Status Bar -->
    <div class="status-bar"><span>9:41</span>
     <div style="display:flex;gap:6px;align-items:center;">
      <svg width="17" height="12" viewbox="0 0 17 12" fill="white">
       <rect x="0" y="5" width="3" height="7" rx="1" /><rect x="4.5" y="3" width="3" height="9" rx="1" /><rect x="9" y="1" width="3" height="11" rx="1" /><rect x="13.5" y="0" width="3" height="12" rx="1" />
      </svg>
      <svg width="16" height="12" viewbox="0 0 16 12" fill="white">
       <path d="M8 2.4C5.6 2.4 3.4 3.3 1.8 4.9L0 3.1C2.1 1.1 4.9 0 8 0s5.9 1.1 8 3.1L14.2 4.9C12.6 3.3 10.4 2.4 8 2.4zM8 7.2c-1.5 0-2.9.6-3.9 1.5L2.3 6.9C3.8 5.5 5.8 4.8 8 4.8s4.2.7 5.7 2.1L11.9 8.7C10.9 7.8 9.5 7.2 8 7.2zM8 12l-2.1-2.1c1.2-1.2 3.1-1.2 4.2 0L8 12z" />
      </svg>
      <div style="display:flex;align-items:center;gap:2px;">
       <div style="width:24px;height:11px;border:1.5px solid rgba(255,255,255,0.4);border-radius:3px;padding:1.5px;">
        <div style="width:70%;height:100%;background:#fff;border-radius:1.5px;"></div>
       </div>
      </div>
     </div>
    </div><!-- Header Bar -->
    <div class="header-bar" id="headerBar">
     <h1 id="appTitle" style="font-size:20px;font-weight:700;color:#fff;margin:0;">EduConecta</h1><i data-lucide="search" style="width:22px;height:22px;color:#fff;cursor:pointer;"></i>
    </div><!-- Background Orbs -->
    <div class="gradient-orb" style="width:200px;height:200px;background:#6366f1;top:60px;right:-40px;"></div>
    <div class="gradient-orb" style="width:160px;height:160px;background:#8b5cf6;bottom:200px;left:-30px;"></div><!-- Content Area -->
    <div class="content-area" id="contentArea"><!-- HOME SCREEN -->
     <div id="homeScreen" class="fade-in">
      <div style="margin-bottom:20px;">
       <h2 id="homeTitle" style="font-size:24px;font-weight:700;color:#fff;margin-bottom:12px;">Oportunidades</h2>
       <div id="filterContainer" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;"><button onclick="filterCategory('all')" class="filter-btn active" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(99,102,241,0.2);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.3s ease;">Todos</button> <button onclick="filterCategory('cursos')" class="filter-btn" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.3s ease;">Cursos</button> <button onclick="filterCategory('eventos')" class="filter-btn" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.3s ease;">Eventos</button> <button onclick="filterCategory('vagas')" class="filter-btn" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.3s ease;">Vagas</button> <button onclick="filterCategory('workshops')" class="filter-btn" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.3s ease;">Workshops</button>
       </div>
      </div>
      <div id="opportunitiesList"></div>
     </div><!-- DETAILS SCREEN -->
     <div id="detailsScreen" style="display:none;opacity:0;"><button onclick="goHome()" style="background:none;border:none;color:#fff;cursor:pointer;margin-bottom:16px;font-size:16px;display:flex;align-items:center;gap:8px;"> <i data-lucide="arrow-left" style="width:20px;height:20px;"></i> Voltar </button>
      <div id="detailsContent"></div>
     </div><!-- SAVED SCREEN -->
     <div id="savedScreen" style="display:none;opacity:0;">
      <h2 style="font-size:24px;font-weight:700;color:#fff;margin-bottom:16px;">Salvos</h2>
      <div id="savedList"></div>
     </div><!-- PROFILE SCREEN -->
     <div id="profileScreen" style="display:none;opacity:0;">
      <div style="text-align:center;margin-bottom:24px;">
       <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;"><i data-lucide="user" style="width:40px;height:40px;color:#fff;"></i>
       </div>
       <h2 id="studentName" style="font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;">João Silva</h2>
       <p style="font-size:12px;color:rgba(255,255,255,0.6);">Estudante</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
       <div style="background:rgba(99,102,241,0.1);padding:16px;border-radius:12px;border:1px solid rgba(99,102,241,0.2);">
        <p style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Visualizadas</p>
        <p id="viewedCount" style="font-size:24px;font-weight:700;color:#fff;">0</p>
       </div>
       <div style="background:rgba(168,85,247,0.1);padding:16px;border-radius:12px;border:1px solid rgba(168,85,247,0.2);">
        <p style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;">Inscrições</p>
        <p id="subscribedCount" style="font-size:24px;font-weight:700;color:#fff;">0</p>
       </div>
      </div>
      <h3 style="font-size:16px;font-weight:700;color:#fff;margin-bottom:12px;">Oportunidades Salvas</h3>
      <div id="profileSavedList"></div><button class="button-primary" style="width:100%;margin-top:16px;">Editar Perfil</button>
     </div>
    </div><!-- Tab Bar -->
    <div class="tab-bar" style="background: linear-gradient(to top, #000 60%, transparent);">
     <div class="tab-item active" data-tab="home" onclick="setActiveTab(this, 'home')">
      <div class="tab-icon-wrap">
       <i data-lucide="home" style="width:22px;height:22px;color:#fff;"></i>
      </div><span class="tab-label" id="label_home" style="color:#fff;">Início</span>
      <div class="tab-dot"></div>
     </div>
     <div class="tab-item" data-tab="search" onclick="setActiveTab(this, 'search')">
      <div class="tab-icon-wrap">
       <i data-lucide="search" style="width:22px;height:22px;color:#fff;"></i>
      </div><span class="tab-label" id="label_search" style="color:#fff;">Buscar</span>
      <div class="tab-dot"></div>
     </div>
     <div class="tab-item" data-tab="saved" onclick="setActiveTab(this, 'saved')">
      <div class="tab-icon-wrap">
       <i data-lucide="bookmark" style="width:22px;height:22px;color:#fff;"></i>
      </div><span class="tab-label" id="label_saved" style="color:#fff;">Salvos</span>
      <div class="tab-dot"></div>
     </div>
     <div class="tab-item" data-tab="profile" onclick="setActiveTab(this, 'profile')">
      <div class="tab-icon-wrap">
       <i data-lucide="user" style="width:22px;height:22px;color:#fff;"></i>
      </div><span class="tab-label" id="label_profile" style="color:#fff;">Perfil</span>
      <div class="tab-dot"></div>
     </div>
    </div><!-- Home Indicator -->
    <div class="home-indicator"></div>
   </div>
  </main>
  <script>
    let allOpportunities = [];
    let currentFilter = 'all';
    let currentPage = 'home';
    let studentStats = { viewed: 0, subscribed: 0 };

    const categoryColors = {
      cursos: 'rgba(99,102,241,0.2)',
      eventos: 'rgba(236,72,153,0.2)',
      vagas: 'rgba(34,197,94,0.2)',
      workshops: 'rgba(168,85,247,0.2)'
    };

    const categoryBgColors = {
      cursos: '#6366f1',
      eventos: '#ec4899',
      vagas: '#22c55e',
      workshops: '#a855f7'
    };

    // Data SDK Handler
    const dataHandler = {
      onDataChanged(data) {
        allOpportunities = data;
        renderOpportunities();
        updateStats();
      }
    };

    // Initialize Data SDK
    async function initData() {
      if (window.dataSdk) {
        const result = await window.dataSdk.init(dataHandler);
        if (!result.isOk) console.error('Failed to init Data SDK');
      }
    }

    function renderOpportunities() {
      const list = document.getElementById('opportunitiesList');
      const filtered = currentFilter === 'all' ? allOpportunities : allOpportunities.filter(o => o.category === currentFilter);

      list.innerHTML = filtered.map(opp => `
        <div class="opportunity-card" onclick="viewDetails('${opp.__backendId}')">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">
            <span class="category-badge" style="background:${categoryBgColors[opp.category] || '#6366f1'};">${opp.category}</span>
            <button onclick="event.stopPropagation();toggleSave('${opp.__backendId}')" style="background:none;border:none;cursor:pointer;">
              <i data-lucide="${opp.saved ? 'bookmark' : 'bookmark'}" style="width:18px;height:18px;color:${opp.saved ? '#fbbf24' : 'rgba(255,255,255,0.4)'};${opp.saved ? 'fill:#fbbf24;' : ''}"></i>
            </button>
          </div>
          <h3 style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">${opp.title}</h3>
          <p style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;">${opp.description}</p>
          <div style="display:flex;gap:12px;font-size:11px;color:rgba(255,255,255,0.5);">
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="calendar" style="width:14px;height:14px;"></i> ${opp.date}</span>
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="map-pin" style="width:14px;height:14px;"></i> ${opp.location}</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function filterCategory(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.style.background = 'transparent';
        btn.style.color = 'rgba(255,255,255,0.6)';
      });
      event.target.style.background = 'rgba(99,102,241,0.2)';
      event.target.style.color = '#fff';
      renderOpportunities();
    }

    function viewDetails(id) {
      const opp = allOpportunities.find(o => o.__backendId === id);
      if (!opp) return;

      studentStats.viewed++;
      updateStats();

      const details = document.getElementById('detailsContent');
      details.innerHTML = `
        <div style="background:linear-gradient(135deg,${categoryBgColors[opp.category]},${categoryBgColors[opp.category]}40);padding:24px;border-radius:16px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;height:120px;">
          <i data-lucide="book-open" style="width:48px;height:48px;color:#fff;opacity:0.8;"></i>
        </div>
        <h2 style="font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;">${opp.title}</h2>
        <p style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:16px;">${opp.institution}</p>
        <h3 style="font-size:14px;font-weight:700;color:#fff;margin-bottom:8px;">Sobre</h3>
        <p style="font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:16px;line-height:1.6;">${opp.description}</p>
        <div style="background:rgba(255,255,255,0.04);padding:12px;border-radius:12px;margin-bottom:16px;">
          <p style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px;"><strong>Data:</strong> ${opp.date}</p>
          <p style="font-size:12px;color:rgba(255,255,255,0.6);">📍 ${opp.location}</p>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:16px;">
          <button onclick="subscribe('${opp.__backendId}')" class="button-primary" style="flex:1;">${opp.subscribed ? '✓ Inscrito' : 'Inscrever-se'}</button>
          <button onclick="toggleSave('${opp.__backendId}')" class="button-secondary" style="flex:1;"><i data-lucide="bookmark" style="width:16px;height:16px;display:inline;margin-right:4px;"></i>${opp.saved ? 'Salvo' : 'Salvar'}</button>
        </div>
      `;
      lucide.createIcons();
      showScreen('details');
    }

    async function toggleSave(id) {
      const opp = allOpportunities.find(o => o.__backendId === id);
      if (!opp) return;
      opp.saved = !opp.saved;
      const result = await window.dataSdk.update(opp);
      if (result.isOk) renderOpportunities();
    }

    async function subscribe(id) {
      const opp = allOpportunities.find(o => o.__backendId === id);
      if (!opp) return;
      opp.subscribed = !opp.subscribed;
      if (opp.subscribed) studentStats.subscribed++;
      const result = await window.dataSdk.update(opp);
      if (result.isOk) {
        updateStats();
        viewDetails(id);
      }
    }

    function renderSaved() {
      const list = document.getElementById('savedList');
      const saved = allOpportunities.filter(o => o.saved);
      list.innerHTML = saved.length > 0 ? saved.map(opp => `
        <div class="opportunity-card" onclick="viewDetails('${opp.__backendId}')">
          <h3 style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">${opp.title}</h3>
          <p style="font-size:12px;color:rgba(255,255,255,0.6);">${opp.institution}</p>
        </div>
      `).join('') : '<p style="color:rgba(255,255,255,0.6);text-align:center;padding:40px 0;">Nenhuma oportunidade salva</p>';
    }

    function renderProfileSaved() {
      const list = document.getElementById('profileSavedList');
      const saved = allOpportunities.filter(o => o.saved);
      list.innerHTML = saved.length > 0 ? saved.map(opp => `
        <div class="opportunity-card" onclick="viewDetails('${opp.__backendId}')" style="margin-bottom:8px;">
          <p style="font-size:13px;font-weight:600;color:#fff;">${opp.title}</p>
        </div>
      `).join('') : '<p style="color:rgba(255,255,255,0.6);font-size:13px;">Nenhuma oportunidade salva</p>';
    }

    function updateStats() {
      document.getElementById('viewedCount').textContent = studentStats.viewed;
      document.getElementById('subscribedCount').textContent = studentStats.subscribed;
      renderProfileSaved();
    }

    function goHome() {
      showScreen('home');
    }

    function showScreen(screen) {
      const screens = ['homeScreen', 'detailsScreen', 'savedScreen', 'profileScreen'];
      screens.forEach(s => {
        const el = document.getElementById(s);
        el.style.display = s === screen + 'Screen' ? 'block' : 'none';
        if (s === screen + 'Screen') el.style.opacity = '1';
      });
      currentPage = screen;
    }

    function setActiveTab(el, tab) {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');

      switch(tab) {
        case 'home': showScreen('home'); break;
        case 'saved': renderSaved(); showScreen('saved'); break;
        case 'profile': showScreen('profile'); break;
        case 'search': alert('Buscador em desenvolvimento'); break;
      }
    }

    // Element SDK
    const defaultConfig = {
      background_color: '#000000',
      icon_color: '#ffffff',
      accent_color: '#6366f1',
      text_color: '#ffffff',
      font_family: 'Plus Jakarta Sans',
      font_size: 16,
      app_title: 'EduConecta',

      ['home', 'search', 'saved', 'profile'].forEach(key => {

          ['search_label', config.search_label || defaultConfig.search_label],
          ['saved_label', config.saved_label || defaultConfig.saved_label],
          ['profile_label', config.profile_label || defaultConfig.profile_label]
        ])
      });
    }
